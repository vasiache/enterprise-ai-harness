{{- if .Values.pingTool.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-tool
  namespace: shared-tools
  labels:
    {{- include "shared-tools.labels" . | nindent 4 }}
    app: ping-tool
spec:
  replicas: {{ .Values.pingTool.replicas }}
  selector:
    matchLabels:
      app: ping-tool
  template:
    metadata:
      labels:
        app: ping-tool
        {{- include "shared-tools.labels" . | nindent 8 }}
    spec:
      containers:
        - name: ping-tool
          image: {{ .Values.pingTool.image }}
          imagePullPolicy: {{ .Values.pingTool.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.pingTool.port }}
              name: http
          env: []
          resources:
            {{- toYaml .Values.pingTool.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ping-tool
  namespace: shared-tools
  labels:
    {{- include "shared-tools.labels" . | nindent 4 }}
    app: ping-tool
spec:
  selector:
    app: ping-tool
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
{{- end }}
