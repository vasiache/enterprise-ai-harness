apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  strategy:
    type: Recreate   # Single replica with PVC - Recreate avoids mount conflicts
  template:
    metadata:
      labels:
        app: postgres
        {{- include "platform.labels" . | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: {{ .Values.postgres.port }}
              name: postgres
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: PGPORT
              value: {{ .Values.postgres.port | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.postgres.port | quote }}
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: initscripts
              mountPath: /docker-entrypoint-initdb.d/init-scripts/99-roles.sql
              subPath: 99-roles.sql
              readOnly: true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "supabase_admin"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "supabase_admin"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: postgres-data
          emptyDir: {}
        - name: initscripts
          configMap:
            name: postgres-initscripts
