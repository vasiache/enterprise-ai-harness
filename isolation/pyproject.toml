[tool.uv.workspace]
members = [
    "packages/saas-common",
    "agents/*",
    "tools/*",
    "channels/*",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests", "packages/saas-common/tests"]
